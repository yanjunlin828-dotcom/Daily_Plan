<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日规划</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- 左栏：长期目标 -->
    <aside class="panel-goals">
      <!-- 面板标题（小屏可点击折叠） -->
      <div class="panel-goals-toggle">
        <div class="panel-header">
          <span class="prompt" style="color:var(--accent)">&gt;</span>
          <span class="panel-title">长期目标</span>
        </div>
        <span class="toggle-arrow">▼</span>
      </div>

      <!-- 类型切换器 -->
      <div class="goals-type-switcher">
        <button id="type-btn-goal" class="type-btn" data-type="goal">◆ Goal</button>
        <button id="type-btn-todo" class="type-btn active-todo" data-type="todo">□ Todo</button>
      </div>

      <!-- 输入区 -->
      <div class="goals-input-section">
        <span class="prompt" style="color:var(--accent)">&gt;</span>
        <input
          id="goal-input"
          class="goals-task-input"
          type="text"
          placeholder="添加目标/待办（#标签 @日期）..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="goal-add-btn" class="goals-add-btn">+</button>
      </div>

      <!-- 条目列表（可滚动区域） -->
      <div class="goals-scroll-area">
        <ul id="goals-list" class="goals-list"></ul>
        <div id="goals-empty" class="goals-empty-state hidden">
          <p>暂无长期目标，输入上方添加</p>
        </div>
      </div>
    </aside>

    <!-- 右栏：每日任务 -->
    <main class="panel-daily">
      <div class="container">
        <header class="header">
          <div class="date-line">
            <span class="prompt">&gt;</span>
            <span id="date-display" class="date-text"></span>
            <div class="timer-slot">
              <div id="timer-panel" class="timer-panel hidden" aria-label="计时器">
                <div class="timer-panel-header" id="timer-drag-handle">
                  <span class="timer-panel-prompt">&gt;</span>
                  <span class="timer-panel-title">// timer</span>
                  <span id="timer-header-time" class="timer-header-time">00:00:00</span>
                  <div class="timer-header-actions">
                    <button id="timer-minimize-btn" class="timer-window-btn" title="最小化">_</button>
                    <button id="timer-close-btn" class="timer-window-btn timer-window-btn--close" title="关闭">×</button>
                  </div>
                </div>
                <div class="timer-body">
                  <div class="timer-ring-container">
                    <svg id="timer-svg" class="timer-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                      <circle class="timer-ring-bg" cx="120" cy="120" r="90"/>
                      <g id="timer-ticks"></g>
                      <circle id="timer-ring-progress" class="timer-ring-progress" cx="120" cy="120" r="90"/>
                      <circle class="timer-center-mask" cx="120" cy="120" r="81"/>
                    </svg>
                    <div class="timer-display">
                      <div id="timer-digits" class="timer-digits">
                        <span id="timer-hours" class="timer-digit-group">00</span>
                        <span class="timer-colon">:</span>
                        <span id="timer-minutes" class="timer-digit-group">00</span>
                        <span class="timer-colon">:</span>
                        <span id="timer-seconds-el" class="timer-digit-group">00</span>
                      </div>
                      <div class="timer-label">elapsed</div>
                    </div>
                  </div>
                  <div class="timer-controls">
                    <button id="timer-start-btn" class="timer-start-btn">▶ START</button>
                    <button id="timer-reset-btn" class="timer-reset-btn">↺ RESET</button>
                  </div>
                </div>
              </div>
            </div>
            <button id="workhard-btn" class="workhard-btn" title="今天努力了吗？点击标记">hard?</button>
          </div>
          <div class="progress-section">
            <span id="progress-text" class="progress-text">0 / 0 已完成</span>
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
          </div>
        </header>

        <div class="input-section">
          <span class="prompt">&gt;</span>
          <input
            id="task-input"
            class="task-input"
            type="text"
            placeholder="添加新任务..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="add-btn" class="add-btn">+</button>
        </div>

        <div id="tag-filter-bar" class="tag-filter-bar hidden"></div>

        <!-- 任务列表（可滚动区域） -->
        <div class="task-scroll-area">
          <ul id="task-list" class="task-list"></ul>

          <div id="empty-state" class="empty-state">
            <span class="empty-icon">_</span>
            <p>今日暂无任务，输入上方添加</p>
          </div>

          <div id="all-done-banner" class="all-done-banner hidden">
            全部完成！今天做得很好。
          </div>

          <div id="carry-done-banner" class="carry-done-banner hidden">
            ↪ 已将 <span id="carry-done-count">0</span> 个任务延续到明天
          </div>
        </div>

        <nav class="nav-section">
          <button id="prev-btn" class="nav-btn">← 昨天</button>
          <div class="nav-center-btns">
            <button id="cal-btn" class="cal-btn" title="日历">▦ cal</button>
            <button id="memo-btn" class="memo-btn" title="当日备忘录">// memo</button>
            <button id="timer-btn" class="timer-nav-btn" title="计时器">⏱ timer</button>
            <button id="carry-btn" class="carry-btn" title="将未完成任务延续到明天">↪ carry</button>
          </div>
          <button id="next-btn" class="nav-btn">明天 →</button>
        </nav>
      </div>
    </main>

  </div>

  <!-- 日历弹窗 -->
  <div id="cal-overlay" class="memo-overlay hidden" aria-hidden="true">
    <div id="cal-modal" class="cal-modal" role="dialog" aria-modal="true">

      <!-- 头部 -->
      <div class="cal-modal-header">
        <span class="memo-modal-prompt">&gt;</span>
        <span class="cal-modal-title">// calendar</span>
        <button id="cal-today-btn" class="cal-today-btn">今日</button>
      </div>

      <div class="memo-modal-divider"></div>

      <!-- 月份导航 -->
      <div class="cal-month-nav">
        <button id="cal-prev-month" class="cal-nav-arrow">←</button>
        <span id="cal-month-label" class="cal-month-label"></span>
        <button id="cal-next-month" class="cal-nav-arrow">→</button>
      </div>

      <!-- 星期标题行 -->
      <div class="cal-weekday-row">
        <span>日</span><span>一</span><span>二</span>
        <span>三</span><span>四</span><span>五</span><span>六</span>
      </div>

      <!-- 日期网格（JS 动态生成） -->
      <div id="cal-grid" class="cal-grid"></div>

      <!-- 底部图例 -->
      <div class="memo-modal-divider"></div>
      <div class="cal-modal-footer">
        <span class="cal-legend">
          <span class="cal-legend-hard-box"></span> 全完成/努力了
          <span class="cal-legend-mark">//</span> 有备忘
        </span>
        <span class="cal-hint">单击跳转 · 双击开备忘录</span>
      </div>

    </div>
  </div>

  <!-- 备忘录弹窗 -->
  <div id="memo-overlay" class="memo-overlay hidden" aria-hidden="true">
    <div id="memo-modal" class="memo-modal" role="dialog" aria-modal="true">
      <div class="memo-modal-header">
        <span class="memo-modal-prompt">&gt;</span>
        <span class="memo-modal-title">// memo</span>
        <span id="memo-modal-date" class="memo-modal-date"></span>
      </div>
      <div class="memo-modal-divider"></div>
      <textarea
        id="memo-textarea"
        class="memo-textarea"
        placeholder="在这里记录今天的备忘..."
        spellcheck="false"
        autocomplete="off"
      ></textarea>
      <div class="memo-modal-divider"></div>
      <div class="memo-modal-footer">
        <span id="memo-char-count" class="memo-char-count">0 字</span>
      </div>
    </div>
  </div>

  <!-- 子任务面板（与备忘录弹窗结构相同：遮罩包裹面板） -->
  <div id="subtask-overlay" class="subtask-overlay hidden" aria-hidden="true">
    <div id="subtask-panel" class="subtask-panel" role="dialog" aria-modal="true"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
